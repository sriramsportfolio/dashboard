<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portfolio Dashboard</title>

<style>
body { font-family: Arial; background:#0b1220; color:white; padding:20px;}
input, button { padding:8px; margin:5px; }
table { width:100%; margin-top:15px; border-collapse: collapse;}
td, th { padding:10px; border-bottom:1px solid #333; text-align:center;}
.positive { color:lightgreen; }
.negative { color:red; }
</style>
</head>

<body>

<h2>📊 Portfolio</h2>

<input id="ticker" placeholder="Ticker">
<input id="qty" type="number" placeholder="Qty">
<input id="buy" type="number" placeholder="Buy Price">
<button onclick="add()">Add</button>

<button onclick="update()">🔄 Refresh Prices</button>

<h3>Total Portfolio Value: <span id="tv">$0</span></h3>
<h3>Total Gain/Loss: <span id="tg">$0</span></h3>

<table>
<thead>
<tr>
<th>Ticker</th>
<th>Qty</th>
<th>Buy Price</th>
<th>Cost Basis</th>
<th>Live Price</th>
<th>Current Value</th>
<th>Gain/Loss</th>
</tr>
</thead>

<tbody id="rows"></tbody>
</table>

<script>

const API_KEY = "PASTE_YOUR_KEY_HERE";

let portfolio = JSON.parse(localStorage.getItem("portfolio")) || [];

function save(){
    localStorage.setItem("portfolio", JSON.stringify(portfolio));
}

// ADD STOCK
function add(){
    let t = ticker.value.toUpperCase();
    let q = parseFloat(qty.value);
    let b = parseFloat(buy.value);

    if(!t || !q || !b) {
        alert("Enter all fields");
        return;
    }

    portfolio.push({t,q,b});
    save();
    render();
}

// FETCH PRICE
async function getPrice(sym){
    try{
        let res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${API_KEY}`);
        let data = await res.json();
        return data.c || 0;
    }catch{
        return 0;
    }
}

// UPDATE PRICES + CALCULATIONS
async function update(){

    let totalValue = 0;
    let totalCost = 0;

    for(let item of portfolio){

        let price = await getPrice(item.t);

        item.live = price;
        item.cost = item.q * item.b;
        item.value = item.q * price;
        item.gain = item.value - item.cost;

        totalValue += item.value;
        totalCost += item.cost;
    }

    let totalGain = totalValue - totalCost;

    document.getElementById("tv").innerText = "$" + totalValue.toFixed(2);

    let tg = document.getElementById("tg");
    tg.innerText = "$" + totalGain.toFixed(2);
    tg.className = totalGain >= 0 ? "positive" : "negative";

    save();
    render();
}

// RENDER TABLE
function render(){

    rows.innerHTML = "";

    portfolio.forEach(item => {

        rows.innerHTML += `
        <tr>
            <td>${item.t}</td>
            <td>${item.q}</td>
            <td>$${item.b.toFixed(2)}</td>
            <td>$${(item.cost || 0).toFixed(2)}</td>
            <td>$${(item.live || 0).toFixed(2)}</td>
            <td>$${(item.value || 0).toFixed(2)}</td>
            <td class="${item.gain >= 0 ? 'positive' : 'negative'}">
                $${(item.gain || 0).toFixed(2)}
            </td>
        </tr>`;
    });
}

render();

</script>

</body>
</html>
