<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0b1220;
    color: white;
}

header {
    background: #111827;
    padding: 15px;
    font-size: 22px;
}

.container {
    padding: 20px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 8px 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #1f2937;
    text-align: center;
}

th {
    background: #0f172a;
}

.positive { color: lightgreen; }
.negative { color: red; }

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}
</style>
</head>

<body>

<header>📊 Portfolio Dashboard</header>

<div class="container">

<!-- INPUT -->
<div class="card">
    <h3>Add Investment</h3>
    <input id="ticker" placeholder="Ticker (AAPL)">
    <input id="qty" type="number" placeholder="Qty">
    <input id="buy" type="number" placeholder="Buy Price">
    <input id="date" type="date">

    <select id="asset">
        <option>US Equity</option>
        <option>Bonds</option>
        <option>International</option>
        <option>Cash</option>
        <option>Multi Asset</option>
    </select>

    <button onclick="addInvestment()">Add</button>
</div>

<!-- SUMMARY -->
<div class="card">
    <h3>Summary</h3>
    <div class="grid">
        <div>Total Value<br><span id="totalValue">$0</span></div>
        <div>Total Cost<br><span id="totalCost">$0</span></div>
        <div>Gain/Loss<br><span id="totalGain">$0</span></div>
        <div>Holdings<br><span id="count">0</span></div>
    </div>
</div>

<button onclick="updatePrices()">🔄 Refresh Live Prices</button>
<button onclick="clearAll()">🗑 Reset</button>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>Ticker</th>
<th>Qty</th>
<th>Buy</th>
<th>Live</th>
<th>Value</th>
<th>Gain</th>
<th>Asset</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

// STORAGE
let portfolio = JSON.parse(localStorage.getItem("portfolio")) || [];

function save() {
    localStorage.setItem("portfolio", JSON.stringify(portfolio));
}

// ADD
function addInvestment() {
    let t = document.getElementById("ticker").value.toUpperCase();
    let q = parseFloat(document.getElementById("qty").value);
    let b = parseFloat(document.getElementById("buy").value);
    let d = document.getElementById("date").value;
    let a = document.getElementById("asset").value;

    if (!t || !q || !b) {
        alert("Enter required fields");
        return;
    }

    portfolio.push({ ticker: t, qty: q, buy: b, date: d, asset: a });

    save();
    render();
    updatePrices();
}

// DELETE
function removeItem(i) {
    portfolio.splice(i,1);
    save();
    render();
    updatePrices();
}

// 🔥 FIXED PRICE FUNCTION (WORKS LOCALLY)
async function getPrice(symbol) {
    try {
        let url = `https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`;
        let res = await fetch(url);
        let data = await res.json();

        if (!data.quoteResponse.result.length) return null;

        return data.quoteResponse.result[0].regularMarketPrice;
    } catch (e) {
        console.log("Error:", symbol);
        return null;
    }
}

// UPDATE PRICES
async function updatePrices() {
    let totalValue = 0;
    let totalCost = 0;

    for (let item of portfolio) {
        let price = await getPrice(item.ticker);
        item.live = price || 0;

        item.value = item.qty * item.live;
        item.cost = item.qty * item.buy;

        totalValue += item.value;
        totalCost += item.cost;
    }

    save();
    render();

    let gain = totalValue - totalCost;

    document.getElementById("totalValue").innerText = "$" + totalValue.toFixed(2);
    document.getElementById("totalCost").innerText = "$" + totalCost.toFixed(2);

    let g = document.getElementById("totalGain");
    g.innerText = "$" + gain.toFixed(2);
    g.className = gain >= 0 ? "positive" : "negative";

    document.getElementById("count").innerText = portfolio.length;
}

// RENDER
function render() {
    let table = document.getElementById("table");
    table.innerHTML = "";

    portfolio.forEach((p, i) => {
        let gain = (p.value || 0) - (p.cost || 0);

        table.innerHTML += `
        <tr>
            <td>${p.ticker}</td>
            <td>${p.qty}</td>
            <td>$${p.buy}</td>
            <td>$${(p.live || 0).toFixed(2)}</td>
            <td>$${(p.value || 0).toFixed(2)}</td>
            <td class="${gain>=0?'positive':'negative'}">$${gain.toFixed(2)}</td>
            <td>${p.asset}</td>
            <td><button onclick="removeItem(${i})">X</button></td>
        </tr>`;
    });
}

// CLEAR
function clearAll() {
    if(confirm("Clear all data?")) {
        portfolio = [];
        save();
        render();
        updatePrices();
    }
}

// INIT
render();
updatePrices();

</script>

</body>
</html>
