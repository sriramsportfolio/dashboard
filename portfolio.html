<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portfolio Dashboard</title>

<style>
body { font-family: Arial; background:#0b1220; color:white; padding:20px;}
input, button { padding:8px; margin:5px; }
table { width:100%; margin-top:15px; border-collapse: collapse;}
td, th { padding:10px; border-bottom:1px solid #333;}
.positive { color:lightgreen; }
.negative { color:red; }
</style>
</head>

<body>

<h2>📊 Portfolio</h2>

<input id="ticker" placeholder="Ticker">
<input id="qty" type="number" placeholder="Qty">
<input id="buy" type="number" placeholder="Buy Price">
<button onclick="add()">Add</button>

<button onclick="update()">🔄 Refresh Prices</button>

<h3>Total Value: <span id="tv">$0</span></h3>
<h3>Total Gain: <span id="tg">$0</span></h3>

<table>
<thead>
<tr>
<th>Ticker</th><th>Qty</th><th>Buy</th><th>Live</th><th>Value</th><th>Gain</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>

const API_KEY = "PASTE_YOUR_KEY_HERE";

let p = JSON.parse(localStorage.getItem("p")) || [];

function save(){ localStorage.setItem("p", JSON.stringify(p)); }

function add(){
    let t = ticker.value.toUpperCase();
    let q = parseFloat(qty.value);
    let b = parseFloat(buy.value);

    if(!t || !q || !b) return;

    p.push({t,q,b});
    save();
    render();
}

async function price(sym){
    try{
        let r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${API_KEY}`);
        let d = await r.json();
        return d.c; // current price
    }catch{
        return 0;
    }
}

async function update(){
    let tv=0, tc=0;

    for(let i of p){
        let pr = await price(i.t);
        i.live = pr;

        i.val = i.q * pr;
        i.cost = i.q * i.b;

        tv += i.val;
        tc += i.cost;
    }

    render();

    let g = tv - tc;

    tvEl.innerText = "$"+tv.toFixed(2);
    tg.innerText = "$"+g.toFixed(2);
    tg.className = g>=0 ? "positive":"negative";
}

function render(){
    rows.innerHTML="";

    p.forEach(i=>{
        let g = (i.val||0)-(i.cost||0);

        rows.innerHTML += `
        <tr>
        <td>${i.t}</td>
        <td>${i.q}</td>
        <td>$${i.b}</td>
        <td>$${(i.live||0).toFixed(2)}</td>
        <td>$${(i.val||0).toFixed(2)}</td>
        <td class="${g>=0?'positive':'negative'}">$${g.toFixed(2)}</td>
        </tr>`;
    });
}

render();

</script>

</body>
</html>
